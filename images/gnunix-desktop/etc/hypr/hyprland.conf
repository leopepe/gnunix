# Default Hyprland config.
#
# Minimal starter so a fresh image has a usable session out of the box.
# User-level overrides go in ~/.config/hypr/hyprland.conf (or home-manager).
# Per ADR-020 (compositor switch Sway → Hyprland).

### Output / monitor
# Auto-detect; native resolution; 1x scale.
monitor = , preferred, auto, 1

### Workarounds (virtio-gpu / VM)
# Tart and qemu's virtio-gpu drivers don't reliably handle hardware
# cursors; the cursor goes invisible without this. Real-hardware setups
# can remove the line in ~/.config/hypr/hyprland.conf to get the
# hardware-accelerated cursor back.
env = WLR_NO_HARDWARE_CURSORS,1

### Modifier and shortcuts
$mod = SUPER
$term = /nix/var/nix/profiles/system/bin/foot

bind = $mod,       Return, exec,        $term
bind = $mod SHIFT, Q,      killactive
bind = $mod SHIFT, C,      exec,        hyprctl reload
bind = $mod SHIFT, E,      exit
bind = $mod SHIFT, SPACE,  togglefloating

# Focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Workspaces 1-5
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

### Input
input {
    kb_layout = us
    follow_mouse = 1
}

### Appearance
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    layout = dwindle
}

decoration {
    rounding = 4
    # Blur is GPU-heavy; off by default for VM/virtio-gpu safety. Flip
    # this to true on real hardware to get the modern Hyprland look.
    blur {
        enabled = false
    }
}

animations {
    enabled = true
}

### Status bar — waybar.
# pkill first so reload doesn't multiply instances.
exec-once = pkill -x waybar; /nix/var/nix/profiles/system/bin/waybar
