# /etc/syslog.conf — sysklogd routing rules.
#
# Format: <facility>.<priority>[;...]   <target>
#   target: filename / -filename (no sync) / @host / username / *
#
# Slackware 15.0's defaults, lightly trimmed. cron is silenced because we
# don't ship a cron daemon yet (dcron + logrotate are a separate follow-up).

# Everything informational, except mail / authpriv / cron, goes to messages.
*.info;mail.none;authpriv.none;cron.none       /var/log/messages

# Authentication / privileged operations
authpriv.*                                     /var/log/secure

# Mail subsystem — `-` prefix skips fsync between writes (large volume).
mail.*                                         -/var/log/maillog

# Cron — dcron logs here.
cron.*                                         /var/log/cron

# Emergency: write to every logged-in user's terminal.
*.emerg                                        :omusrmsg:*

# Boot messages: rc.S / rc.M chatter via the local7 facility.
local7.*                                       /var/log/boot.log
