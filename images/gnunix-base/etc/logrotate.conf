# /etc/logrotate.conf — system-wide logrotate defaults.
#
# Per-service rules live under /etc/logrotate.d/. logrotate is invoked
# daily by /etc/cron.d/logrotate (dcron).

# Rotate weekly by default; keep 4 weeks of compressed history.
weekly
rotate 4

# Create a new (empty) log file after rotating the old one.
create

# Don't include compression for the current (in-progress) file — only
# previous rotations get compressed. Saves CPU; the active log stays
# greppable without decompression.
compress
delaycompress

# Skip a rotation cycle if the log file is empty.
notifempty

# Drop in service-specific rules below.
include /etc/logrotate.d
