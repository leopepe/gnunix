# /boot/grub/grub.cfg — boot menu.

set default=0
set timeout=2

insmod efi_gop
insmod part_gpt
insmod ext2

# Default kernel cmdline:
# - root=/dev/vda2 rootwait — virtio-blk needs a moment to probe; LABEL=
#   lookup fails because it races partition discovery.
# - console=hvc0 first so /dev/console = hvc0 (visible via `tart run --serial`).
#   tty1 is the fallback for the framebuffer.
menuentry "gnunix-base" {
    set root=(hd0,gpt2)
    linux  /boot/vmlinuz-LFS_KERNEL_VERSION root=/dev/vda2 rootfstype=ext4 rootwait rw console=tty1 console=hvc0
}

menuentry "gnunix-base (single-user)" {
    set root=(hd0,gpt2)
    linux  /boot/vmlinuz-LFS_KERNEL_VERSION root=/dev/vda2 rootfstype=ext4 rootwait rw console=tty1 console=hvc0 single
}

# Emergency shell — bypass /sbin/init entirely, drop straight to bash on the
# console. Lets us inspect a broken system via `tart run --serial`.
menuentry "gnunix-base (emergency shell)" {
    set root=(hd0,gpt2)
    linux  /boot/vmlinuz-LFS_KERNEL_VERSION root=/dev/vda2 rootfstype=ext4 rootwait rw console=tty1 console=hvc0 init=/bin/bash
}
