<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" color="#1b1f24" role="img" aria-label="GNUnix — hex step pyramid">
  <title>GNUnix — Hex Step Pyramid</title>
  <desc>Top-down view of a hexagonal stepped pyramid (three concentric
        hex rings, the GNUstep base seen from above), with six lambdas
        radiating between the steps (the Nix layer). Most aggressive
        fusion of the two reference logos: every motif is shared.</desc>

  <g transform="translate(128 128)">
    <!-- Outer hex ring (lightest tone, widest step) -->
    <polygon points="-104,-60 -104,60 0,120 104,60 104,-60 0,-120" opacity="0.15"/>

    <!-- Middle hex ring -->
    <polygon points="-72,-42 -72,42 0,83 72,42 72,-42 0,-83" opacity="0.32"/>

    <!-- Inner hex (peak of the pyramid) -->
    <polygon points="-36,-21 -36,21 0,42 36,21 36,-21 0,-42" opacity="0.55"/>

    <!-- Tiny crowning hex (the apex) -->
    <polygon points="-14,-8 -14,8 0,16 14,8 14,-8 0,-16"/>

    <!-- Six small lambdas, one per hex vertex axis, riding the steps -->
    <g id="step-lambda">
      <!-- Lambda pointing outward (-Y), sitting between mid ring and outer ring -->
      <polygon points="-3,-104 3,-104 -10,-58 -18,-58"/>
      <polygon points="1,-78 6,-78 18,-58 10,-58"/>
      <!-- Stepped foot where the lambda lands on the step -->
      <rect x="-20" y="-58" width="4" height="4"/>
      <rect x="-14" y="-54" width="4" height="4"/>
      <rect x="14" y="-58" width="4" height="4"/>
      <rect x="8" y="-54" width="4" height="4"/>
    </g>
    <use href="#step-lambda" transform="rotate(60)"/>
    <use href="#step-lambda" transform="rotate(120)"/>
    <use href="#step-lambda" transform="rotate(180)"/>
    <use href="#step-lambda" transform="rotate(240)"/>
    <use href="#step-lambda" transform="rotate(300)"/>
  </g>
</svg>
