# actionlint config.
#
# Per ADR-021 there are no self-hosted runners on this repo. No custom
# labels need declaring. This file exists so any future drift — someone
# re-introducing `runs-on: [self-hosted, …]` — gets flagged by
# actionlint as an unknown runner instead of silently passing.
#
# To deliberately re-enable self-hosted, supersede ADR-021 first.
