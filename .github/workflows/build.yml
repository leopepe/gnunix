# Assemble the four published GNUnix images for a tag, by fetching each one
# from the maintainer's `gnunix-images-<ver>` GH Release and re-uploading it as
# a workflow artifact for `release.yml` to attach to the user-facing draft.
#
# Per ADR-021, every job runs on a free GitHub-hosted runner. Per ADR-016,
# `gnunix-base` (6–10 h) is rebuilt on the maintainer's unmanaged Mac, never
# in CI. Per ADR-018, `gnunix-minimal` is the canonical "release-dep anchor"
# that downstream layers consume rather than rebuild.
#
# !! STAGED DELIVERY — this is PR-3b.1 of two. !!
#
# Today (PR-3b.1): all four jobs are FETCH jobs. The maintainer publishes
#   `gnunix-{base,minimal,desktop,installer}-<arch>-<ver>.img.zst` to the
#   `gnunix-images-<ver>` GH Release from a Mac (via `tools/release-image.sh
#   <image> --release-tag=gnunix-images-<ver>`) before pushing the `v<ver>`
#   tag. CI fetches and re-uploads. ADR-018's hot-CI-path diagram
#   (rebuild desktop+installer in CI on top of fetched minimal) is
#   temporarily deviated from — flagged in the runbook and in tracking
#   issue #20.
#
# Next (PR-3b.2, not in this PR): the qemu+KVM driver lands in
#   `scripts/vm-helpers.sh`, `tools/fetch-image.sh` gets a working
#   `qemu:img.zst` import branch, and the `gnunix-desktop` /
#   `gnunix-installer` jobs here pivot from FETCH back to true rebuild —
#   layering on the fetched `gnunix-minimal`. The `package` and
#   `installer-test` matrices come back at the same time.
#
# Trigger model (ADR-008):
#   * push tag v*       — artifacts retained 90d so release.yml can attach
#                         them to the GH Release.
#   * workflow_dispatch — manual rerun knob (e.g., re-fetch after the
#                         maintainer re-uploaded a gnunix-images asset).
#
# Release publishing is not done here:
#   `.github/workflows/release.yml` triggers on the same tag, waits for
#   this workflow's run on the same SHA to finish, downloads its
#   artifacts, computes SHA256SUMS, and drafts the GH Release. See
#   `docs/runbooks/release.md`.

name: Build images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      images:
        description: "Comma-separated list (gnunix-base, gnunix-minimal, gnunix-desktop, gnunix-installer)"
        required: false
        default: "gnunix-base,gnunix-minimal,gnunix-desktop,gnunix-installer"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve version + arch once, share via outputs. Keeps the four
  # fetch jobs free of duplicated jq calls.
  meta:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.r.outputs.version }}
      arch:    ${{ steps.r.outputs.arch }}
      gnunix_images_tag: ${{ steps.r.outputs.gnunix_images_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        run: |
          set -eu
          v=$(jq -r .lfs_image_version tools/manifest.json)
          a=$(jq -r '.active_arch // .target_arch' tools/manifest.json)
          {
            echo "version=$v"
            echo "arch=$a"
            echo "gnunix_images_tag=gnunix-images-$v"
          } >> "$GITHUB_OUTPUT"

  # Each fetch-* job is a thin wrapper around tools/fetch-image.sh
  # against the `gnunix-images-<ver>` release. The image already exists
  # on that release because the maintainer published it from a Mac
  # before pushing the tag — see docs/runbooks/release.md.
  #
  # Parallel by design: fetches are independent. In PR-3b.2, fetch-desktop
  # and fetch-installer will be replaced by build-* jobs with `needs:
  # fetch-minimal`, restoring the linear dependency that proves layering.

  fetch-base:
    needs: meta
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.images, 'gnunix-base')
    steps:
      - uses: actions/checkout@v4
      - name: Fetch gnunix-base from ${{ needs.meta.outputs.gnunix_images_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tools/fetch-image.sh gnunix-base \
            --no-import \
            --release-tag=${{ needs.meta.outputs.gnunix_images_tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: gnunix-base-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}
          path: cache/artifacts/gnunix-base-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}.img.zst
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 30 }}

  fetch-minimal:
    needs: meta
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.images, 'gnunix-minimal')
    steps:
      - uses: actions/checkout@v4
      - name: Fetch gnunix-minimal from ${{ needs.meta.outputs.gnunix_images_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tools/fetch-image.sh gnunix-minimal \
            --no-import \
            --release-tag=${{ needs.meta.outputs.gnunix_images_tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: gnunix-minimal-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}
          path: cache/artifacts/gnunix-minimal-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}.img.zst
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 30 }}

  # Until PR-3b.2 wires the qemu rebuild path, desktop is fetched from the
  # same `gnunix-images-<ver>` track. The maintainer publishes it there with
  # `tools/release-image.sh gnunix-desktop --release-tag=gnunix-images-<ver>`.
  fetch-desktop:
    needs: meta
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.images, 'gnunix-desktop')
    steps:
      - uses: actions/checkout@v4
      - name: Fetch gnunix-desktop from ${{ needs.meta.outputs.gnunix_images_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tools/fetch-image.sh gnunix-desktop \
            --no-import \
            --release-tag=${{ needs.meta.outputs.gnunix_images_tag }}
      - uses: actions/upload-artifact@v4
        with:
          name: gnunix-desktop-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}
          path: cache/artifacts/gnunix-desktop-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}.img.zst
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 30 }}

  # Installer is best-effort. Scaffolding may not have a published asset
  # for every release yet — release.yml's sanity check only requires
  # base/minimal/desktop, so a missing installer doesn't sink the tag.
  fetch-installer:
    needs: meta
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.images, 'gnunix-installer')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Fetch gnunix-installer from ${{ needs.meta.outputs.gnunix_images_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ADR-017 says installer ships as a hybrid ISO, but the
          # scaffolded build still emits .img.zst (see PR #8). Try ISO
          # first, fall back to img.zst, soft-fail if neither exists.
          set +e
          tools/fetch-image.sh gnunix-installer \
            --no-import \
            --form=iso \
            --release-tag=${{ needs.meta.outputs.gnunix_images_tag }}
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "[fetch-installer] no .iso asset — trying .img.zst"
            tools/fetch-image.sh gnunix-installer \
              --no-import \
              --release-tag=${{ needs.meta.outputs.gnunix_images_tag }}
            rc=$?
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::warning title=Installer not published::no installer asset on ${{ needs.meta.outputs.gnunix_images_tag }} — release.yml will skip the installer slot"
            exit 0
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gnunix-installer-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}
          path: |
            cache/artifacts/gnunix-installer-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}.iso
            cache/artifacts/gnunix-installer-${{ needs.meta.outputs.arch }}-${{ needs.meta.outputs.version }}.img.zst
          if-no-files-found: ignore
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 30 }}
